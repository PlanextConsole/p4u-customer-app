name: p4u_customer_app
description: Native Flutter Customer App for Planext4u.
publish_to: "none"
version: 5.37.1+84

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  firebase_core: ^3.10.1
  firebase_auth: ^5.4.1
  google_fonts: ^6.2.1
  intl: ^0.20.2
  shared_preferences: ^2.5.3
  image_picker: ^1.1.2
  file_picker:
    path: third_party/file_picker
  fl_chart: ^0.70.2
  geolocator: ^13.0.2
  url_launcher: ^6.3.1
  video_player: ^2.9.2
  visibility_detector: ^0.4.0+2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/banners/
    - assets/images/categories/
    - assets/images/products/
